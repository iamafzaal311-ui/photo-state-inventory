name: Flutter Web Deploy to Netlify

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2.16.0
      with:
        channel: 'stable'
        flutter-version: '3.24.0' # Yeh up-to-date version aapki dependency requirement ko perfectly match karega

    - name: Install Dependencies
      run: flutter pub get

    - name: Build Flutter Web
      run: flutter build web --release

    - name: Inject Isar Wasm
      run: |
        mkdir -p build/web
        curl -L "https://github.com/isar/isar/releases/download/3.1.0%2B1/isar.wasm" -o build/web/isar.wasm || echo "Isar WASM download failed"

    - name: Deploy to Netlify
      uses: nwtgck/actions-netlify@v3.0
      with:
        publish-dir: './build/web'
        production-deploy: true
        github-token: ${{ secrets.GITHUB_TOKEN }}
        enable-commit-comment: false
      env:
        NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}